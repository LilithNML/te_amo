<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>En mantenimiento</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #0d0d14 0%, #050509 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 20px;
    }

    .anime-girl {
      width: 250px;
      height: 250px;
      background-image: url('https://i.postimg.cc/kGH8N2jp/1000020470.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 15px #7dd3fc);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 1.8rem;
      color: #7dd3fc;
      text-shadow: 0 0 10px #38bdf8;
    }

    p {
      color: #a5b4fc;
      font-size: 1rem;
    }

    .loader {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 15px;
    }

    .loader div {
      width: 10px;
      height: 10px;
      background-color: #7dd3fc;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loader div:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loader div:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.8rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="anime-girl"></div>
    <h1>Actualizando la página...</h1>
    <p>Por favor espera mientras la reparo</p>
    <div class="loader">
      <div></div><div></div><div></div>
    </div>
  </div>
  <footer>© 2025 - Sitio en mantenimiento temporal</footer>
</body>
</html>
