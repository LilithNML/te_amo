<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Mantenimiento</title>
    <style>
        /* --- Reset y Tipografía --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1c20 0%, #0f1012 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        /* --- Contenedor Principal --- */
        .container {
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.5s ease-in-out;
        }

        /* --- Textos --- */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #a0a0a0;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* --- Contador --- */
        .countdown {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 8px;
            min-width: 100px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .time-box span {
            display: block;
        }

        .number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
        }

        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #d1d1d1;
            margin-top: 0.5rem;
        }

        /* --- Footer --- */
        .footer-note {
            font-size: 0.9rem;
            color: #666;
            margin-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 1rem;
        }

        /* --- Animaciones --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Responsividad --- */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .countdown { gap: 1rem; }
            .time-box { min-width: 70px; padding: 0.8rem; }
            .number { font-size: 1.8rem; }
            .label { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sitio en Mantenimiento</h1>
        <p class="subtitle">
            Estoy realizando actualizaciones para mejorar tu experiencia.<br>
            Gracias por tu paciencia. Estará de vuelta en:
        </p>

        <div class="countdown" id="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Días</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>

        <div class="footer-note">
            &copy; 2025 Licenciada Bocchi.
        </div>
    </div>

    <script>
        // Fecha objetivo: 25 de diciembre de 2025
        const targetDate = new Date("December 25, 2025 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "<div class='time-box' style='width:100%'>¡Mantenimiento Finalizado!</div>";
                return;
            }

            // Cálculos de tiempo
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Actualización del DOM con ceros a la izquierda si es necesario
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        // Iniciar intervalo
        setInterval(updateCountdown, 1000);
        
        // Ejecutar inmediatamente para evitar el retraso de 1s al cargar
        updateCountdown();
    </script>
</body>
</html>
